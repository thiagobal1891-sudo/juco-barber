version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: barberos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barberos
      POSTGRES_PASSWORD: barberos_secret
      POSTGRES_DB: barberos_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U barberos']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: barberos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass barberos_redis_secret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'barberos_redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
